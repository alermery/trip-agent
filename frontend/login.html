<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小C助手 - 登录</title>
  <link rel="icon" type="image/png" href="./favicon.ico">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-bg-page">
  <div class="auth-corner">
    <a class="link-btn" href="./admin-login.html">管理员</a>
  </div>
  <main class="auth-page">
    <section class="auth-card">
      <h1>登录--小C助手</h1>
      <p>输入账号后进入多智能体对话；支持天气、地图路线、数据检索与行程规划。</p>

      <!-- 仍参与逻辑与默认值，仅不在界面展示（与对话页一致） -->
      <div class="xc-endpoint-fields" aria-hidden="true">
        <label>
          API 基地址
          <input id="apiBase" value="http://127.0.0.1:8000" autocomplete="off" />
        </label>
      </div>
      <label>
        用户名
        <input id="username" placeholder="请输入用户名">
      </label>
      <label>
        密码
        <input id="password" type="password" placeholder="请输入密码">
      </label>

      <div class="btn-row btn-row--dual">
        <button id="loginBtn" class="btn" type="button">登录</button>
        <button id="registerBtn" class="btn" type="button">注册</button>
      </div>
      <p id="hint" class="hint"></p>
    </section>
  </main>
  <script src="./common.js"></script>
  <script src="./auth.js"></script>
</body>
</html>
