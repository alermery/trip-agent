<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小C助手 · 管理员登录</title>
  <link rel="icon" type="image/png" href="./favicon.ico">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="auth-corner">
    <a class="link-btn" href="./login.html">用户登录</a>
  </div>
  <main class="auth-page">
    <section class="auth-card">
      <p class="auth-eyebrow">ADMIN · RAG</p>
      <h1>管理员登录</h1>
      <p>仅管理员可进入 RAG 知识上传页。请在服务端 <code>.env</code> 配置 <code>ADMIN_USERNAME</code> / <code>ADMIN_PASSWORD</code> 后首次启动会自动创建或提升该账号。</p>

      <!-- 仍参与逻辑与默认值，仅不在界面展示（与对话页一致） -->
      <div class="xc-endpoint-fields" aria-hidden="true">
        <label>
          API 基地址
          <input id="apiBase" value="http://127.0.0.1:8000" autocomplete="off" />
        </label>
      </div>
      <label>
        管理员用户名
        <input id="username" placeholder="默认 admin">
      </label>
      <label>
        密码
        <input id="password" type="password" placeholder="与 .env 中 ADMIN_PASSWORD 一致">
      </label>

      <div class="btn-row">
        <button id="loginBtn" class="btn">登录</button>
      </div>
      <p id="hint" class="hint"></p>
    </section>
  </main>
   <script src="./common.js"></script>
  <script src="./admin-login.js"></script>
</body>
</html>
